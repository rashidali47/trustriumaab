name: Build Android App

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'
        cache: 'npm'

    - name: Install dependencies
      run: npm install

    - name: Prepare assets
      run: |
        mkdir -p assets
        # Capacitor assets expects specific filenames
        cp logo.png assets/icon.png
        cp logo.png assets/splash.png

    - name: Generate Assets
      run: npx @capacitor/assets generate --android

    - name: Build Web App
      run: npm run build

    - name: Capacitor Sync
      run: |
        npx cap add android || true
        npx cap sync android
        # More robust permission injection
        cat <<EOF > android/app/src/main/AndroidManifest.xml.new
        $(sed '/<manifest/a <uses-permission android:name="android.permission.INTERNET" />\n<uses-permission android:name="android.permission.RECORD_AUDIO" />\n<uses-permission android:name="android.permission.CAMERA" />\n<uses-permission android:name="android.permission.ACCESS_FINE_LOCATION" />\n<uses-permission android:name="android.permission.SYSTEM_ALERT_WINDOW" />\n<uses-permission android:name="android.permission.POST_NOTIFICATIONS" />' android/app/src/main/AndroidManifest.xml)
        EOF
        mv android/app/src/main/AndroidManifest.xml.new android/app/src/main/AndroidManifest.xml

    - name: Build with Gradle
      run: |
        cd android
        chmod +x gradlew
        ./gradlew assembleDebug

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: Trustrium-Debug-APK
        path: android/app/build/outputs/apk/debug/app-debug.apk
